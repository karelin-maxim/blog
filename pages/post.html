<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Написать пост</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f0f8ff;
            /* лёгкий голубой фон */
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: #4682b4;
            /* стальной синий */
            color: white;
            text-align: center;
            padding: 30px 0;
            border-bottom: 5px solid #1e90ff;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        nav {
            background-color: #1e90ff;
            padding: 10px 0;
            margin-bottom: 30px;
            border-radius: 6px;
        }

        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #f0f8ff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #4682b4;
            font-weight: 500;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #87ceeb;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
            resize: vertical;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #1e90ff;
        }

        textarea {
            min-height: 200px;
            font-family: inherit;
        }

        button {
            background-color: #1e90ff;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #4682b4;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        footer {
            background-color: #4682b4;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Написать пост</h1>
            <p>Заполните форму, чтобы опубликовать новую запись</p>
        </header>

        <nav>
            <ul>
                <li><a href="/index">Главная</a></li>
                <li><a href="/about">Контакты</a></li>
            </ul>
        </nav>

        <form action="/" method="POST">
            <div class="form-group">
                <label for="author">Ваше имя</label>
                <input type="text" id="author" name="author" placeholder="Как к вам обращаться?" required>
            </div>

            <div class="form-group">
                <label for="content">Текст поста</label>
                <textarea id="content" name="content" placeholder="Напишите ваш пост здесь..." required></textarea>
            </div>

            <button>Опубликовать пост</button>
        </form>

        <footer>
            <p style="color: white;">&copy; 2026 Switter. Все права защищены.</p>
        </footer>
    </div>
</body>

</html>
