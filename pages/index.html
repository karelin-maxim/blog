<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f0f8ff;
            /* лёгкий голубой фон */
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: #4682b4;
            /* стальной синий */
            color: white;
            text-align: center;
            padding: 30px 0;
            border-bottom: 5px solid #1e90ff;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        nav {
            background-color: #1e90ff;
            padding: 10px 0;
            margin-bottom: 30px;
            border-radius: 6px;
        }

        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #f0f8ff;
        }

        .posts {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .post {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        .post-header {
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .post-title {
            margin: 0;
            color: #4682b4;
            font-size: 1.5rem;
        }

        .post-meta {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .post-content {
            color: #444;
        }

        .post-content p {
            margin: 12px 0;
        }

        .read-more {
            display: inline-block;
            color: #1e90ff;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid #1e90ff;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .read-more:hover {
            color: #4682b4;
            border-color: #4682b4;
        }

        footer {
            background-color: #4682b4;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Switter</h1>
            <p>Ваши интересные сообщения</p>
        </header>

        <nav>
            <ul>
                <li><a href="/index">Главная</a></li>
                <li><a href="/post">Написать пост</a></li>
                <li><a href="/about">Контакты</a></li>
            </ul>
        </nav>

        <div class="posts">
            <!-- Пост  -->
            {{ if .}}
            {{range .}}
            <article class="post">
                <div class="post-header">
                    <h2 class="post-title">{{.Author}}</h2>
                    <div class="post-meta">Дата публикации: {{.CreatedAt}} </div>
                </div>
                <div class="post-content">
                    <p>{{.Content}}</p>
                </div>
                <!-- <a href="#" class="read-more">Читать далее</a> -->
            </article>
            {{end}}
            {{else}}
            <article class="post">
                <div class="post-header">
                    <h2 class="post-title">...</h2>
                </div>
                <div class="post-content">
                    <p>Создайте пост и он появится в этой ленте!</p>
                </div>
                <!-- <a href="#" class="read-more">Читать далее</a> -->
            </article>


            {{end}}

        </div>

        <footer>
            <p style="color: white;">&copy; 2026 Switter. Все права защищены.</p>
        </footer>
    </div>
</body>

</html>
